<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen flex items-center justify-center p-gutter">
<!-- Login Container -->
<main class="w-full max-w-[440px]">
<!-- Branding Header -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container text-on-primary-container mb-4">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary font-bold tracking-tight mb-2">Sistem Absensi</h1>
<p class="font-headline-md text-headline-md text-on-surface-variant">Selamat datang kembali</p>
<p class="font-body-sm text-body-sm text-outline mt-1">Silakan masuk ke panel administrasi Anda</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-card-padding shadow-2xl">
<form class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-wider" for="username">
                        Username
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full bg-surface-container-low border border-outline-variant text-on-surface rounded-lg py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all placeholder:text-outline/50" id="username" name="username" placeholder="Masukkan username" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-wider" for="password">
                            Password
                        </label>
<a class="text-xs text-primary-container hover:underline transition-all" href="#">Lupa Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant text-on-surface rounded-lg py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me Toggle (Visual only) -->
<div class="flex items-center">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container-low text-primary-container focus:ring-primary-container" id="remember" type="checkbox"/>
<label class="ml-2 font-body-sm text-body-sm text-on-surface-variant" for="remember">Tetap masuk di perangkat ini</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container text-on-primary-container font-title-sm py-3 px-6 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Masuk
                    <span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Separator -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container px-2 text-outline">Informasi Sistem</span>
</div>
</div>
<!-- Conditional Link for New Admin -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-2">Belum memiliki akun pengelola?</p>
<a class="inline-flex items-center gap-1 font-label-caps text-label-caps text-primary-container hover:text-primary transition-colors py-2 px-4 border border-primary-container/30 rounded-full bg-primary-container/5" href="#">
<span class="material-symbols-outlined text-sm">person_add</span>
                    Daftar Admin Baru
                </a>
</div>
</div>
<!-- Footer Visual Decoration -->
<div class="mt-12 flex justify-center gap-8 opacity-40 grayscale pointer-events-none">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">verified_user</span>
<span class="font-label-caps text-[10px] text-on-surface-variant uppercase">Secure Access</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">fingerprint</span>
<span class="font-label-caps text-[10px] text-on-surface-variant uppercase">Biometric Ready</span>
</div>
</div>
<!-- Technical Decorative Image -->
<div class="mt-8 flex justify-center">
<img class="w-32 h-auto rounded-lg opacity-20 border border-outline-variant" data-alt="A highly detailed close-up of a futuristic circuit board with glowing blue neon traces and microchips, set against a dark brushed metal background. The lighting is low-key with sharp technical highlights, creating a sense of advanced security and computational power. The aesthetic is clean, technical, and perfectly matches a modern corporate dark mode interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGD5Ph7EFeemTl5r7cwQqOsNwLun8b8LcfqWFWFT5rMmcU67JMU8uUPRgzxQcHpFUjryecSqsFlx_PWYvuZvUPUv9xkzoYjfikcKFSKsEtGEo-hUcS8Af9--MtNAqpMfJqCEUJCNH4AfjTWOad8TUtFkjlKF87v4Y_E-VhaDvBfIh61jwfjPomGDfxRuWfvtKN8hhbpbLyQppxoNdftg65U2jE-OltfO7aNj65NbnAVkAj03rdTg2CB7v8_vbsmmCeVU5NuC2Td0XM"/>
